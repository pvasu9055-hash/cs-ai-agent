<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #00f5a0;
    --accent2: #00d9f5;
    --text: #e2e8f0;
    --muted: #64748b;
    --user-bubble: #1e3a5f;
    --ai-bubble: #0f2a1a;
    --border: #1e293b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,245,160,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,217,245,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative; z-index: 10;
    padding: 16px 24px;
    background: rgba(17,24,39,0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; gap: 14px;
  }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 16px; color: #0a0e1a; flex-shrink: 0;
  }
  .header-text h1 { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .header-text p { font-size: 12px; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
  .status {
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--accent); font-family: 'JetBrains Mono', monospace;
  }
  .status-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  #chat {
    flex: 1; overflow-y: auto; padding: 24px 16px;
    display: flex; flex-direction: column; gap: 16px;
    position: relative; z-index: 1;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .message { display: flex; gap: 10px; max-width: 85%; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
  }
  .message.ai .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0a0e1a; }
  .message.user .avatar { background: var(--user-bubble); color: var(--accent2); border: 1px solid rgba(0,217,245,0.3); }
  .bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .message.ai .bubble { background: var(--ai-bubble); border: 1px solid rgba(0,245,160,0.15); border-top-left-radius: 4px; }
  .message.user .bubble { background: var(--user-bubble); border: 1px solid rgba(0,217,245,0.2); border-top-right-radius: 4px; }
  .bubble code { font-family: 'JetBrains Mono', monospace; background: rgba(0,245,160,0.1); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .bubble pre { background: #0a0e1a; border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 10px; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); line-height: 1.5; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
  .typing span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }
  .welcome { text-align: center; padding: 32px 16px; animation: fadeUp 0.5s ease; }
  .welcome h2 { font-size: 22px; font-weight: 600; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .welcome p { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .suggestion { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'JetBrains Mono', monospace; }
  .suggestion:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .input-area { position: relative; z-index: 10; padding: 16px; background: rgba(17,24,39,0.95); border-top: 1px solid var(--border); backdrop-filter: blur(12px); }
  .api-setup { background: var(--surface2); border: 1px solid rgba(0,245,160,0.2); border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; display: flex; gap: 10px; align-items: center; }
  .api-setup input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none; }
  .api-setup input:focus { border-color: var(--accent); }
  .api-setup input::placeholder { color: var(--muted); }
  .api-label { font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
  .free-badge { font-size: 10px; background: rgba(0,245,160,0.15); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 14px; resize: none; outline: none; max-height: 120px; min-height: 48px; transition: border-color 0.2s; line-height: 1.5; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  button#send { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  button#send:hover { transform: scale(1.05); opacity: 0.9; }
  button#send:active { transform: scale(0.95); }
  button#send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .error-msg { color: #f87171; font-size: 12px; font-family: 'JetBrains Mono', monospace; padding: 8px 12px; background: rgba(248,113,113,0.1); border-radius: 8px; margin-top: 8px; display: none; }
</style>
</head>
<body>
<header>
  <div class="logo">CS</div>
  <div class="header-text">
    <h1>CS AI Agent</h1>
    <p>// powered by Groq 🚀</p>
  </div>
  <div class="status"><div class="status-dot"></div>free</div>
</header>

<div id="chat">
  <div class="welcome">
    <h2>Hey! I'm your CS tutor 👋</h2>
    <p>Ask me anything about programming, algorithms, data structures, and more.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="suggest(this)">What is Big O notation?</div>
      <div class="suggestion" onclick="suggest(this)">Explain recursion simply</div>
      <div class="suggestion" onclick="suggest(this)">How does a hash table work?</div>
      <div class="suggestion" onclick="suggest(this)">What is OOP?</div>
      <div class="suggestion" onclick="suggest(this)">Difference: stack vs queue</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="api-setup">
    <span class="api-label">GROQ KEY:</span>
    <input type="password" id="apiKey" placeholder="Paste your free Groq API key..." />
    <span class="free-badge">FREE</span>
  </div>
  <div class="input-row">
    <textarea id="userInput" placeholder="Ask a CS question..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send" onclick="sendMessage()">
      <svg width="20" height="20" fill="none" stroke="#0a0e1a" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
  // Store conversation as alternating user/model messages
  let conversationHistory = [];

  const SYSTEM_PROMPT = `You are an expert Computer Science tutor AI agent. Help students understand CS concepts clearly and simply.
- Be friendly, encouraging, and patient
- Use analogies and real-world examples  
- Break complex topics into simple steps
- When showing code, always explain what it does
- Use emojis occasionally to keep things engaging
- Specialize in: algorithms, data structures, OOP, databases, networking, OS, web development, programming languages
- Keep explanations concise but complete
- Format code properly using markdown code blocks`;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function suggest(el) {
    document.getElementById('userInput').value = el.textContent;
    sendMessage();
  }

  function addMessage(role, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'ai' ? 'AI' : 'U';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);
    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function formatText(text) {
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre>${escHtml(code.trim())}</pre>`);
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'message ai'; div.id = 'typing';
    div.innerHTML = `<div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() { document.getElementById('typing')?.remove(); }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 6000);
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const apiKey = document.getElementById('apiKey').value.trim();
    const text = input.value.trim();

    if (!text) return;
    if (!apiKey) { showError('⚠ Please enter your free Groq API key first'); return; }

    document.querySelector('.welcome')?.remove();
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send').disabled = true;

    addMessage('user', text);

    // Add to history
    conversationHistory.push({ role: 'user', parts: [{ text }] });

    showTyping();

    try {
      const messages = [
        { role: 'system', content: SYSTEM_PROMPT },
        ...conversationHistory.map(m => ({
          role: m.role === 'model' ? 'assistant' : m.role,
          content: m.parts[0].text
        }))
      ];

      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages,
          temperature: 0.7,
          max_tokens: 1024
        })
      });

      if (!response.ok) {
        const errData = await response.json();
        removeTyping();
        const errMsg = errData?.error?.message || 'Unknown error';
        showError('API Error: ' + errMsg);
        conversationHistory.pop();
        document.getElementById('send').disabled = false;
        return;
      }

      const data = await response.json();
      const reply = data?.choices?.[0]?.message?.content;

      if (!reply) {
        removeTyping();
        showError('No response from Groq. Try again!');
        conversationHistory.pop();
        document.getElementById('send').disabled = false;
        return;
      }

      // Add AI response to history
      conversationHistory.push({ role: 'assistant', parts: [{ text: reply }] });

      removeTyping();
      addMessage('ai', reply);

    } catch (e) {
      removeTyping();
      showError('Connection error: ' + e.message);
      conversationHistory.pop();
    }

    document.getElementById('send').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
